services:

  catalog-db:
    image: postgres:15-alpine
    container_name: urbano-catalog-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB_CATALOG:-catalog_db}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB_CATALOG:-catalog_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  users-db:
    image: postgres:15-alpine
    container_name: users-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB_USERS:-users_prod}
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB_USERS:-users_prod}"]
      interval: 5s
      timeout: 5s
      retries: 5

  orders-db:
    image: postgres:15-alpine
    container_name: urbano-orders-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB_ORDERS:-orders_db}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB_ORDERS:-orders_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  inventory-db:
    image: postgres:15-alpine
    container_name: urbano-inventory-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB_INVENTORY:-inventory_db}
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB_INVENTORY:-inventory_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  event-bus:
    image: rabbitmq:3-management-alpine
    container_name: urbano-event-bus
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  catalog-service:
    build:
      context: .
      dockerfile: apps/catalog-service/Dockerfile
    container_name: catalog-service
    restart: always
    depends_on:
      catalog-db:
        condition: service_healthy
      event-bus:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@catalog-db:5432/${POSTGRES_DB_CATALOG:-catalog_db}
      EVENT_BUS_URL: ${EVENT_BUS_URL:-amqp://event-bus:5672}
      INVENTORY_SERVICE_URL: ${INVENTORY_SERVICE_URL:-http://inventory-service:3004}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DD_SERVICE: catalog-service
      DD_ENV: ${DD_ENV:-development}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_API_KEY: ${DD_API_KEY:-}
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  users-service:
    build:
      context: .
      dockerfile: apps/users-service/Dockerfile
    container_name: users-service
    restart: always
    depends_on:
      users-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@users-db:5432/${POSTGRES_DB_USERS:-users_prod}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DD_SERVICE: users-service
      DD_ENV: ${DD_ENV:-development}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_API_KEY: ${DD_API_KEY:-}
    ports:
      - "3002:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    container_name: auth-service
    restart: always
    depends_on:
      users-service:
        condition: service_started
    environment:
      PORT: 3003
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      USERS_SERVICE_URL: ${USERS_SERVICE_URL:-http://users-service:3000}
      NODE_ENV: ${NODE_ENV:-development}
      DD_SERVICE: auth-service
      DD_ENV: ${DD_ENV:-development}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_API_KEY: ${DD_API_KEY:-}
    ports:
      - "3003:3003"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3003/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  inventory-service:
    build:
      context: .
      dockerfile: apps/inventory-service/Dockerfile
    container_name: inventory-service
    restart: always
    depends_on:
      inventory-db:
        condition: service_healthy
      event-bus:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@inventory-db:5432/${POSTGRES_DB_INVENTORY:-inventory_db}
      EVENT_BUS_URL: ${EVENT_BUS_URL:-amqp://event-bus:5672}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3004
      DD_SERVICE: inventory-service
      DD_ENV: ${DD_ENV:-development}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_API_KEY: ${DD_API_KEY:-}
    ports:
      - "3004:3004"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3004/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  order-service:
    build:
      context: .
      dockerfile: apps/order-service/Dockerfile
    container_name: order-service
    restart: always
    depends_on:
      orders-db:
        condition: service_healthy
      event-bus:
        condition: service_healthy
    environment:
      ORDERS_DATABASE_URL: postgres://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@orders-db:5432/${POSTGRES_DB_ORDERS:-orders_db}
      EVENT_BUS_URL: ${EVENT_BUS_URL:-amqp://event-bus:5672}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3005
      DD_SERVICE: order-service
      DD_ENV: ${DD_ENV:-development}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_API_KEY: ${DD_API_KEY:-}
    ports:
      - "3005:3005"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3005/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
